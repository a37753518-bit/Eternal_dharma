<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मंत्र कोश · सनातन धर्म</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
         :root {
            --maroon-deep: #2a0a0a;
            --maroon-mid: #4a1010;
            --maroon-warm: #6b1e1e;
            --maroon-light: #8b3030;
            --gold-deep: #7a5a00;
            --gold-mid: #c8960a;
            --gold-bright: #f0c040;
            --gold-pale: #fde98a;
            --gold-cream: #fdf5d0;
            --cream: #fef9ee;
            --parchment: #f7edd8;
            --ink: #1a0505;
            --text-warm: #2e1010;
            --text-mid: #4a2020;
            --border-gold: rgba(200, 150, 10, 0.35);
            --shadow-maroon: rgba(42, 10, 10, 0.5);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--maroon-deep);
            background-image: radial-gradient(ellipse 80% 60% at 50% -10%, #4a1010 0%, transparent 70%), url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8960a' fill-opacity='0.04'%3E%3Cpath d='M30 0 L36 24 L60 30 L36 36 L30 60 L24 36 L0 30 L24 24 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            color: var(--gold-pale);
            font-family: 'Crimson Pro', Georgia, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.7;
        }
        /* ===== HEADER ===== */
        
        header {
            background: linear-gradient(180deg, #1a0505 0%, #2a0a0a 60%, #3a1010 100%);
            border-bottom: 1px solid var(--border-gold);
            box-shadow: 0 4px 40px var(--shadow-maroon);
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-mid), var(--gold-bright), var(--gold-mid), transparent);
        }
        
        header::after {
            content: '᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔ ᳔';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            color: rgba(200, 150, 10, 0.2);
            font-size: 0.7rem;
            letter-spacing: 6px;
            text-align: center;
            padding: 4px 0;
        }
        
        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.6rem 2.4rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        
        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .brand-title {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 2.4rem;
            color: var(--gold-bright);
            text-shadow: 0 0 30px rgba(240, 192, 64, 0.4), 2px 2px 0 #1a0505;
            letter-spacing: 3px;
            line-height: 1.1;
        }
        
        .brand-title .om-sym {
            color: #ffdb6a;
            margin-right: 8px;
            filter: drop-shadow(0 0 8px rgba(255, 200, 64, 0.6));
        }
        
        .brand-sub {
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            color: rgba(240, 192, 64, 0.65);
            letter-spacing: 4px;
            text-transform: uppercase;
            padding-left: 2px;
        }
        /* Search */
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(200, 150, 10, 0.4);
            border-radius: 60px;
            padding: 0 0.5rem 0 1.2rem;
            gap: 6px;
            backdrop-filter: blur(6px);
            transition: border-color 0.2s;
        }
        
        .search-box:focus-within {
            border-color: var(--gold-mid);
            box-shadow: 0 0 0 2px rgba(200, 150, 10, 0.2);
        }
        
        .search-box i {
            color: rgba(240, 192, 64, 0.6);
            font-size: 0.95rem;
        }
        
        #searchInput {
            background: transparent;
            border: none;
            outline: none;
            padding: 0.65rem 0.3rem;
            font-size: 1rem;
            font-family: 'Tiro Devanagari Hindi', serif;
            color: var(--gold-pale);
            width: 220px;
        }
        
        #searchInput::placeholder {
            color: rgba(240, 192, 64, 0.4);
            font-style: italic;
        }
        
        .btn-search,
        .btn-home {
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            letter-spacing: 1.5px;
            border: 1px solid var(--gold-mid);
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        
        .btn-search {
            background: linear-gradient(135deg, #b8820a, #c8960a);
            color: #1a0505;
            font-weight: 700;
        }
        
        .btn-search:hover {
            background: linear-gradient(135deg, #c8960a, #f0c040);
            box-shadow: 0 0 20px rgba(200, 150, 10, 0.4);
            transform: translateY(-1px);
        }
        
        .btn-home {
            background: rgba(200, 150, 10, 0.12);
            color: var(--gold-pale);
            text-decoration: none;
        }
        
        .btn-home:hover {
            background: rgba(200, 150, 10, 0.25);
            border-color: var(--gold-bright);
            color: var(--gold-bright);
        }
        /* ===== MAIN ===== */
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
            flex: 1;
        }
        /* Page heading */
        
        .page-top {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 2rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid rgba(200, 150, 10, 0.2);
        }
        
        .page-title-wrap {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .page-title {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 2.6rem;
            color: var(--gold-bright);
            text-shadow: 0 0 40px rgba(240, 192, 64, 0.25);
            line-height: 1.1;
            position: relative;
        }
        
        .page-title::before {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-mid), transparent);
        }
        
        .count-badge {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #6b1e1e, #4a1010);
            border: 1px solid rgba(200, 150, 10, 0.4);
            color: var(--gold-pale);
            padding: 0.35rem 1.2rem;
            border-radius: 30px;
            white-space: nowrap;
        }
        
        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.6rem;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .result-msg {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1rem;
            color: rgba(240, 192, 64, 0.75);
            background: rgba(200, 150, 10, 0.08);
            border: 1px solid rgba(200, 150, 10, 0.2);
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
        }
        
        .btn-reset {
            background: transparent;
            border: 1px dashed rgba(200, 150, 10, 0.4);
            color: rgba(240, 192, 64, 0.7);
            padding: 0.38rem 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.88rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .btn-reset:hover {
            background: rgba(200, 150, 10, 0.15);
            color: var(--gold-bright);
            border-color: var(--gold-mid);
        }
        /* ===== MANTRA GRID ===== */
        
        .mantra-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        /* ===== MANTRA CARD ===== */
        
        .card {
            background: linear-gradient(145deg, #2e0c0c 0%, #230808 100%);
            border: 1px solid rgba(200, 150, 10, 0.25);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            cursor: pointer;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
            opacity: 0.6;
        }
        /* Corner ornaments */
        
        .card::after {
            content: '✦';
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 0.8rem;
            color: rgba(200, 150, 10, 0.35);
            transition: color 0.2s;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(200, 150, 10, 0.4);
            border-color: rgba(200, 150, 10, 0.5);
        }
        
        .card:hover::after {
            color: var(--gold-mid);
        }
        
        .card-header {
            padding: 1.5rem 1.5rem 1rem;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        
        .card-icon {
            font-size: 2.2rem;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 2px;
            filter: drop-shadow(0 0 8px rgba(240, 192, 64, 0.3));
        }
        
        .card-title-wrap {
            flex: 1;
            min-width: 0;
        }
        
        .card-title {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1.45rem;
            color: var(--gold-bright);
            line-height: 1.2;
            margin-bottom: 6px;
        }
        
        .deity-pill {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            color: rgba(200, 150, 10, 0.9);
            background: rgba(200, 150, 10, 0.1);
            border: 1px solid rgba(200, 150, 10, 0.25);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
            text-transform: uppercase;
        }
        /* Mantra phrase (always visible) */
        
        .card-mantra {
            margin: 0 1.5rem 1rem;
            background: rgba(200, 150, 10, 0.07);
            border: 1px dashed rgba(200, 150, 10, 0.3);
            border-radius: 3px;
            padding: 0.7rem 1rem;
        }
        
        .card-mantra-text {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1.05rem;
            color: var(--gold-pale);
            line-height: 1.6;
        }
        /* Expand toggle */
        
        .card-expand-btn {
            margin: 0 1.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: none;
            color: rgba(200, 150, 10, 0.7);
            font-family: 'Cinzel', serif;
            font-size: 0.76rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
            text-transform: uppercase;
        }
        
        .card-expand-btn:hover {
            color: var(--gold-bright);
        }
        
        .card-expand-btn .chevron {
            transition: transform 0.3s ease;
            font-size: 0.7rem;
        }
        
        .card.expanded .chevron {
            transform: rotate(180deg);
        }
        /* Expanded content */
        
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card.expanded .card-body {
            max-height: 600px;
        }
        
        .card-body-inner {
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid rgba(200, 150, 10, 0.12);
            margin-top: 0;
        }
        
        .divider-om {
            text-align: center;
            color: rgba(200, 150, 10, 0.3);
            font-size: 1.1rem;
            letter-spacing: 12px;
            padding: 1rem 0 0.8rem;
        }
        
        .full-mantra-label {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(200, 150, 10, 0.55);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .full-mantra-text {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1.15rem;
            color: var(--gold-pale);
            line-height: 1.9;
            margin-bottom: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem 1rem;
            border-radius: 3px;
            border-left: 3px solid rgba(200, 150, 10, 0.4);
        }
        
        .meaning-label {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 2px;
            color: rgba(200, 150, 10, 0.55);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        
        .meaning-text {
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            font-style: italic;
            color: rgba(253, 233, 138, 0.7);
            line-height: 1.7;
            margin-bottom: 12px;
        }
        
        .benefit-text {
            font-family: 'Crimson Pro', serif;
            font-size: 0.95rem;
            color: rgba(253, 233, 138, 0.6);
            line-height: 1.6;
        }
        
        .tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        
        .tag {
            font-family: 'Cinzel', serif;
            font-size: 0.66rem;
            letter-spacing: 1px;
            color: rgba(200, 150, 10, 0.6);
            background: rgba(200, 150, 10, 0.07);
            border: 1px solid rgba(200, 150, 10, 0.18);
            padding: 0.18rem 0.65rem;
            border-radius: 20px;
            text-transform: uppercase;
        }
        /* No result */
        
        .no-result {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(240, 192, 64, 0.5);
        }
        
        .no-result i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .no-result p {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1.3rem;
        }
        /* ===== FOOTER ===== */
        
        footer {
            background: #1a0505;
            border-top: 1px solid rgba(200, 150, 10, 0.2);
            padding: 1.8rem;
            text-align: center;
        }
        
        .footer-text {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: 1rem;
            color: rgba(240, 192, 64, 0.5);
            line-height: 2;
        }
        
        .footer-om {
            color: var(--gold-mid);
            font-size: 1.3rem;
        }
        /* Responsive */
        
        @media (max-width: 680px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                width: 100%;
            }
            #searchInput {
                width: 100%;
            }
            .btn-home {
                text-align: center;
                justify-content: center;
            }
            .brand-title {
                font-size: 1.9rem;
            }
            .page-title {
                font-size: 2rem;
            }
            .mantra-grid {
                grid-template-columns: 1fr;
            }
        }
        /* Card entrance animation */
        
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            animation: cardIn 0.4s ease both;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-inner">
            <div class="brand">
                <div class="brand-title">
                    <span class="om-sym">ॐ</span> सनातन धर्म
                </div>
                <div class="brand-sub">Mantra Kosha · Sacred Vibrations</div>
            </div>
            <div class="header-controls">
                <div class="search-box">
                    <i class="fas fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="मंत्र खोजें... शिव, गायत्री...">
                    <button class="btn-search" id="searchBtn">
                    <i class="fas fa-search"></i> खोजें
                </button>
                </div>
                <a href="/index" class="btn-home">
                    <i class="fas fa-home"></i> होम
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-top">
            <div class="page-title-wrap">
                <h1 class="page-title">मंत्र कोश</h1>
                <span class="count-badge" id="countBadge">३०+ पवित्र मंत्र</span>
            </div>
        </div>

        <div class="meta-row">
            <span class="result-msg" id="resultMsg">🕉 सभी मंत्र दिखाए जा रहे हैं</span>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-rotate-left"></i> रीसेट</button>
        </div>

        <div class="mantra-grid" id="mantraGrid"></div>
    </main>

    <footer>
        <div class="footer-text">
            <span class="footer-om">ॐ</span> मंत्र · जप · ध्यान · मोक्ष <span class="footer-om">ॐ</span><br> सनातन धर्म — मंत्र विभाग। जपो, गुंजाओ, मुक्त हो जाओ। 🙏
        </div>
    </footer>

    <script>
        (function() {
                'use strict';

                const mantras = [{
                    id: 1,
                    icon: '☀️',
                    title: 'गायत्री मंत्र',
                    deity: 'सवितृ देव',
                    shortMantra: 'ॐ भूर्भुवः स्वः',
                    fullMantra: 'ॐ भूर्भुवः स्वः\nतत्सवितुर्वरेण्यं\nभर्गो देवस्य धीमहि\nधियो यो नः प्रचोदयात् ॥',

                    id: 2,
                    icon: '🔱',
                    title: 'महामृत्युञ्जय मंत्र',
                    deity: 'भगवान शिव',
                    shortMantra: 'ॐ त्र्यम्बकं यजामहे',
                    fullMantra: 'ॐ त्र्यम्बकं यजामहे\nसुगन्धिं पुष्टिवर्धनम्।\nउर्वारुकमिव बन्धनान्\nमृत्योर्मुक्षीय माऽमृतात् ॥',
                    meaning: 'हम त्रिनेत्र शिव की पूजा करते हैं जो सुगन्धित हैं और जो हमारा पालन-पोषण करते हैं। जैसे ककड़ी बेल से अलग हो जाती है, वैसे ही हम मृत्यु के बन्धन से मुक्त हों, न कि अमरत्व से।',

                    tags: ['शिव', 'मृत्युञ्जय', 'रुद्र', 'स्वास्थ्य', 'अमरत्व']
                }, {
                    id: 3,
                    icon: '🕉️',
                    title: 'ॐ नमः शिवाय',

                    </div>
                </div>
            </div>

                e.stopPropagation();
                const isExpanded = card.classList.toggle('expanded');
                btn.setAttribute('aria-expanded', isExpanded);
            });
            card.addEventListener('click', () => {
                const isExpanded = card.classList.toggle('expanded');
                btn.setAttribute('aria-expanded', isExpanded);
            });
        });

    function doSearch() {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { showAll(); return; }
        const filtered = mantras.filter(m =>
            m.title.toLowerCase().includes(q) ||
            m.shortMantra.toLowerCase().includes(q) ||
            m.fullMantra.toLowerCase().includes(q) ||
            m.meaning.toLowerCase().includes(q) ||
            m.deity.toLowerCase().includes(q) ||
            m.tags.some(t => t.toLowerCase().includes(q))
        );
        resultMsg.textContent = `🔍 "${searchInput.value.trim()}" — ${filtered.length} मंत्र मिले`;
        renderCards(filtered);
    }

    function showAll() {
        searchInput.value = '';
        resultMsg.textContent = `🕉 सभी मंत्र दिखाए जा रहे हैं (${mantras.length})`;
        renderCards(mantras);
    }

    searchBtn.addEventListener('click', doSearch);
    resetBtn.addEventListener('click', showAll);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    showAll();
})();
