<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आरती संग्रह — २० दिव्य आरतियाँ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700;900&family=Noto+Sans+Devanagari:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
         :root {
            --saffron: #E8660A;
            --deep-saffron: #C4500A;
            --gold: #D4A017;
            --bright-gold: #F5C842;
            --crimson: #8B1A1A;
            --maroon: #5C0A0A;
            --dark-maroon: #3A0606;
            --cream: #FDF6E3;
            --warm-white: #FFF9F0;
            --parchment: #F5E6C8;
            --text-dark: #2C1A0E;
            --text-med: #5A3A1A;
            --text-light: #8B6040;
            --card-border: rgba(212, 160, 23, 0.45);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--dark-maroon);
            background-image: radial-gradient(ellipse at 15% 0%, rgba(212, 160, 23, 0.18) 0%, transparent 55%), radial-gradient(ellipse at 85% 100%, rgba(232, 102, 10, 0.14) 0%, transparent 55%), url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cpath d='M30 0 L33 27 L60 30 L33 33 L30 60 L27 33 L0 30 L27 27Z' fill='%23D4A017' fill-opacity='0.035'/%3E%3C/g%3E%3C/svg%3E");
            color: var(--text-dark);
            font-family: 'Noto Serif Devanagari', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* ===== HEADER ===== */
        
        header {
            background: linear-gradient(160deg, var(--dark-maroon) 0%, #3A0808 40%, var(--crimson) 100%);
            border-bottom: 3px solid var(--gold);
            padding: 50px 24px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='36' fill='none' stroke='%23D4A017' stroke-width='0.4' stroke-opacity='0.15'/%3E%3Ccircle cx='40' cy='40' r='26' fill='none' stroke='%23D4A017' stroke-width='0.3' stroke-opacity='0.1'/%3E%3C/svg%3E") repeat;
            opacity: 0.4;
        }
        
        .header-inner {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .om-glow {
            font-size: 80px;
            color: var(--bright-gold);
            display: block;
            margin-bottom: 12px;
            animation: omGlow 3s ease-in-out infinite alternate;
            line-height: 1;
        }
        
        @keyframes omGlow {
            from {
                text-shadow: 0 0 20px rgba(245, 200, 66, 0.4), 0 0 40px rgba(212, 160, 23, 0.2);
            }
            to {
                text-shadow: 0 0 60px rgba(245, 200, 66, 0.95), 0 0 100px rgba(212, 160, 23, 0.6), 0 0 150px rgba(232, 102, 10, 0.25);
            }
        }
        
        header h1 {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: clamp(26px, 4.5vw, 50px);
            font-weight: 900;
            color: var(--bright-gold);
            letter-spacing: 0.03em;
            line-height: 1.25;
        }
        
        .header-sub {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 17px;
            color: rgba(245, 200, 66, 0.65);
            margin-top: 8px;
            letter-spacing: 0.06em;
        }
        
        .header-divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px auto 0;
            max-width: 380px;
        }
        
        .header-divider::before,
        .header-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }
        
        .header-divider span {
            color: var(--gold);
            font-size: 16px;
        }
        /* ===== SEARCH & NAV BAR ===== */
        
        .nav-bar {
            background: var(--parchment);
            border-bottom: 2px solid var(--gold);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(92, 10, 10, 0.25);
        }
        
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            background: var(--warm-white);
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 6px 8px 6px 18px;
            flex: 1;
            min-width: 200px;
            max-width: 480px;
            gap: 8px;
        }
        
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
        }
        
        .search-box input::placeholder {
            color: var(--text-light);
        }
        
        .search-box button {
            background: linear-gradient(135deg, var(--saffron), var(--deep-saffron));
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .search-box button:hover {
            background: linear-gradient(135deg, #d45a08, #b04008);
        }
        
        .nav-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .home-btn {
            background: linear-gradient(135deg, var(--crimson), var(--maroon));
            color: var(--bright-gold);
            border: 1px solid var(--gold);
            padding: 8px 22px;
            border-radius: 30px;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        
        .home-btn:hover {
            background: linear-gradient(135deg, #9A2020, #6A1010);
        }
        
        .reset-btn {
            background: transparent;
            border: 1px dashed var(--deep-saffron);
            color: var(--crimson);
            padding: 8px 18px;
            border-radius: 30px;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .reset-btn:hover {
            background: var(--saffron);
            color: white;
            border-color: var(--saffron);
        }
        /* ===== COUNT BADGE ===== */
        
        .intro-band {
            background: var(--parchment);
            border-bottom: 1px solid rgba(212, 160, 23, 0.3);
            padding: 16px 24px;
        }
        
        .intro-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .section-title {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--crimson);
            border-left: 5px solid var(--gold);
            padding-left: 14px;
        }
        
        .result-info {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 14px;
            color: var(--text-med);
            background: rgba(212, 160, 23, 0.15);
            border: 1px solid var(--card-border);
            padding: 6px 16px;
            border-radius: 30px;
        }
        /* ===== MAIN GRID ===== */
        
        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            width: 100%;
        }
        
        .aarti-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }
        /* ===== CARD (identical to chalisha card) ===== */
        
        .card {
            background: linear-gradient(145deg, var(--cream), var(--warm-white));
            border: 2px solid var(--card-border);
            border-radius: 4px;
            box-shadow: 6px 6px 0 rgba(92, 10, 10, 0.18), 0 8px 24px rgba(92, 10, 10, 0.15);
            padding: 24px 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 0;
            transition: transform 0.25s, box-shadow 0.25s;
            animation: fadeUp 0.55s ease both;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--maroon), var(--gold), var(--maroon));
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 10px 10px 0 rgba(92, 10, 10, 0.25), 0 16px 36px rgba(92, 10, 10, 0.22);
            border-color: var(--gold);
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card:nth-child(1) {
            animation-delay: 0.05s;
        }
        
        .card:nth-child(2) {
            animation-delay: 0.10s;
        }
        
        .card:nth-child(3) {
            animation-delay: 0.15s;
        }
        
        .card:nth-child(4) {
            animation-delay: 0.20s;
        }
        
        .card:nth-child(5) {
            animation-delay: 0.25s;
        }
        
        .card:nth-child(6) {
            animation-delay: 0.30s;
        }
        
        .card:nth-child(7) {
            animation-delay: 0.35s;
        }
        
        .card:nth-child(8) {
            animation-delay: 0.40s;
        }
        
        .card:nth-child(9) {
            animation-delay: 0.45s;
        }
        
        .card:nth-child(10) {
            animation-delay: 0.50s;
        }
        
        .card:nth-child(n+11) {
            animation-delay: 0.55s;
        }
        
        .card-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212, 160, 23, 0.3);
        }
        
        .card-emoji {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--crimson), var(--maroon));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            border: 2px solid var(--gold);
            box-shadow: 0 3px 10px rgba(92, 10, 10, 0.3);
        }
        
        .card-title-block h3 {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 19px;
            font-weight: 700;
            color: var(--crimson);
            line-height: 1.3;
        }
        
        .card-title-block .verse-badge {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 12px;
            color: var(--text-light);
            background: rgba(212, 160, 23, 0.15);
            border: 1px solid var(--card-border);
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
        }
        
        .card-desc {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 14px;
            color: var(--text-med);
            line-height: 1.9;
            flex: 1;
            margin-bottom: 14px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--parchment);
        }
        
        .card-desc::-webkit-scrollbar {
            width: 5px;
        }
        
        .card-desc::-webkit-scrollbar-track {
            background: var(--parchment);
        }
        
        .card-desc::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        
        .tag {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 11px;
            color: var(--text-dark);
            background: linear-gradient(135deg, rgba(212, 160, 23, 0.12), rgba(232, 102, 10, 0.08));
            border: 1px solid rgba(212, 160, 23, 0.35);
            padding: 3px 10px;
            border-radius: 20px;
        }
        /* NO RESULT */
        
        .no-result {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(145deg, var(--cream), var(--warm-white));
            border: 2px dashed var(--gold);
            border-radius: 4px;
            color: var(--crimson);
        }
        
        .no-result .no-icon {
            font-size: 60px;
            margin-bottom: 16px;
            display: block;
        }
        
        .no-result h3 {
            font-family: 'Noto Serif Devanagari', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .no-result p {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 15px;
            color: var(--text-light);
        }
        /* ===== FOOTER ===== */
        
        footer {
            background: linear-gradient(135deg, var(--maroon), var(--dark-maroon));
            border-top: 3px solid var(--gold);
            padding: 32px 24px;
            text-align: center;
        }
        
        footer .f-om {
            font-size: 38px;
            color: var(--gold);
            display: block;
            margin-bottom: 10px;
        }
        
        footer p {
            font-family: 'Noto Serif Devanagari', serif;
            color: rgba(245, 200, 66, 0.65);
            font-size: 15px;
            line-height: 1.9;
        }
        
        footer .f-small {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 12px;
            color: rgba(245, 200, 66, 0.35);
            margin-top: 6px;
        }
        /* ===== SCROLLBAR ===== */
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: var(--maroon);
        }
        
         ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 4px;
        }
        
        @media (max-width: 700px) {
            .nav-inner {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box {
                max-width: 100%;
            }
            .nav-right {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <span class="om-glow">ॐ</span>
            <h1>आरती संग्रह</h1>
            <p class="header-sub">सनातन धर्म • भक्ति • २० दिव्य आरतियाँ</p>
            <div class="header-divider">
                <span>🪔</span><span>✦</span><span>🪔</span>
            </div>
        </div>
    </header>

    <!-- SEARCH NAV BAR -->
    <nav class="nav-bar">
        <div class="nav-inner">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="आरती खोजें... जैसे: गणेश, लक्ष्मी, शिव" />
                <button id="searchBtn">🔍 खोजें</button>
            </div>
            <div class="nav-right">
                <button class="reset-btn" id="clearBtn">↺ पुनः दिखाएँ</button>
                <a href="/index" class="home-btn">🏠 मुख्य पृष्ठ</a>
            </div>
        </div>
    </nav>

    <!-- INTRO BAND -->
    <div class="intro-band">
        <div class="intro-inner">
            <div class="section-title">🌸 आरती ग्रन्थागार</div>
            <div class="result-info" id="resultMessage">📖 सभी २० आरतियाँ प्रदर्शित हो रही हैं</div>
        </div>
    </div>

    <!-- MAIN GRID -->
    <main>
        <div class="aarti-grid" id="aartiGrid"></div>
    </main>

    <!-- FOOTER -->
    <footer>
        <span class="f-om">ॐ</span>
        <p>श्रद्धा • भक्ति • धर्म • मोक्ष</p>
        <p>सनातन धर्म — आरती संग्रह • दिव्य स्तुति</p>
        <p class="f-small">ॐ शान्तिः शान्तिः शान्तिः</p>
    </footer>

    <script>
        (function() {
                "use strict";

                // ===== २० आरतियों का डेटा =====
                const aartiLibrary = [{
                    id: 1,
                    title: "श्री गणेश आरती",
                    icon: "🐘",
                    desc: "॥ श्री गणेश आरती ॥\nजय गणेश जय गणेश जय गणेश देवा।\nमाता जाकी पार्वती, पिता महादेवा॥\nएकदंत दयावंत, चार भुजाधारी।\nमस्तक सिंदूर सोहे, मूसे की सवारी॥",
                    tags: ["गणेश", "विघ्नहर्ता", "शिव-पार्वती"]
                }, {
                    id: 2,
                    title: "श्री राम आरती",
                    icon: "🏹",
                    desc: "॥ श्री राम आरती ॥\nश्री रामचंद्र कृपालु भजु मन, हरन भव भय दारुणम्।\nनव कंज लोचन, कंज मुख, कर कंज, पद कंजारुणम्॥\nकंदर्प अगणित अमित छबि, नव नील नीरद सुन्दरम्।",
                    tags: ["राम", "विष्णु", "अयोध्या"]
                }, {
                    id: 3,
                    title: "श्री कृष्ण आरती",
                    icon: "🪈",
                    desc: "॥ श्री कृष्ण आरती ॥\nआरती कुंजबिहारी की, श्री गिरिधर कृष्ण मुरारी की।\nगले में बैजंती माला, मस्तक गोपी चन्दन को।\nसुंदर छवि सबसे न्यारी, श्री गिरिधर कृष्ण मुरारी की॥",
                    tags: ["कृष्ण", "मुरारी", "गोपाल"]
                }, {
                    id: 4,
                    title: "श्री लक्ष्मी आरती",
                    icon: "💰",
                    desc: "॥ श्री लक्ष्मी आरती ॥\nजय लक्ष्मी माता, मैया जय लक्ष्मी माता।\nतुमको निशिदिन सेवत, हर विष्णु विधाता॥\nउमा रमा ब्रह्माणी, तुम ही जग माता।",
                    tags: ["लक्ष्मी", "धन", "समृद्धि"]
                }, {
                    id: 5,
                    title: "श्री दुर्गा आरती",
                    icon: "🦁",
                    desc: "॥ श्री दुर्गा आरती ॥\nजय अम्बे गौरी, मैया जय श्यामा गौरी।\nतुमको निशिदिन ध्यावत, हर ब्रह्मा शिवरी॥\nमांग सिंदूर विराजत, टीको मृगमद को।",
                    tags: ["दुर्गा", "अम्बे", "शक्ति"]
                }, {
                    id: 6,
                    title: "शिव आरती",
                    icon: "🔱",
                    desc: "॥ शिव आरती ॥\nॐ जय शिव ओंकारा, प्रभु जय शिव ओंकारा।\nब्रह्मा विष्णु सदाशिव, अर्धांगी धारा॥\nएकानन चतुरानन, पंचानन राजे।",
                    tags: ["शिव", "महादेव", "ओंकार"]
                }, {
                    id: 7,
                    title: "हनुमान आरती",
                    icon: "🙏",
                    desc: "॥ हनुमान आरती ॥\nआरती कीजै हनुमान लला की, दुष्ट दलन रघुनाथ कला की।\nजाके बल से गिरिवर कांपे, रोग दोष जाके निकट न झांके।",
                    tags: ["हनुमान", "बजरंगबली", "रामभक्त"]
                }, {
                    id: 8,
                    title: "सरस्वती आरती",
                    icon: "📚",
                    desc: "॥ सरस्वती आरती ॥\nजय सरस्वती माता, जय जय सरस्वती माता।\nसद्गुण वैभव शालिनी, त्रिभुवन विख्याता॥\nचन्द्रवदनि पद्मासिनी, द्युति मंगलकारी।",
                    tags: ["सरस्वती", "विद्या", "ज्ञान"]

                // ===== DOM =====
                const grid = document.getElementById('aartiGrid');
                const searchIn = document.getElementById('searchInput');
                const searchBtn = document.getElementById('searchBtn');
                const clearBtn = document.getElementById('clearBtn');
                const resultMsg = document.getElementById('resultMessage');

                // ===== RENDER =====
                function render(list) {
                    if (!list || list.length === 0) {
                        grid.innerHTML = `
                <div class="no-result">
                    <span class="no-icon">🪔</span>
                    <h3>कोई आरती नहीं मिली</h3>
                    <p>कृपया 'गणेश', 'लक्ष्मी' या 'शिव' जैसे शब्द खोजें</p>
                </div>`;
                        return;
                    }
                    grid.innerHTML = list.map(a => `
            <div class="card">
                <div class="card-top">
                    <div class="card-emoji">${a.icon}</div>
                    <div class="card-title-block">
                        <h3>${a.title}</h3>
                        <span class="verse-badge">🕉 आरती</span>
                    </div>
                </div>
                <div class="card-desc">${a.desc.replace(/\n/g, '<br>')}</div>
                <div class="card-tags">
                    ${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
            </div>
        `).join('');
    }

    // ===== SEARCH =====
    function doSearch() {
        const q = searchIn.value.trim().toLowerCase();
        if (!q) {
            render(aartiLibrary);
            resultMsg.textContent = `📖 सभी ${aartiLibrary.length} आरतियाँ प्रदर्शित हो रही हैं`;
            return;
        }
        const found = aartiLibrary.filter(a =>
            a.title.toLowerCase().includes(q) ||
            a.desc.toLowerCase().includes(q) ||
            a.tags.some(t => t.toLowerCase().includes(q))
        );
        render(found);
        resultMsg.textContent = `🔍 "${searchIn.value.trim()}" — ${found.length} आरती मिलीं`;
    }

    // ===== RESET =====
    function doReset() {
        searchIn.value = '';
        render(aartiLibrary);
        resultMsg.textContent = `📖 सभी ${aartiLibrary.length} आरतियाँ प्रदर्शित हो रही हैं`;
    }

    // ===== EVENTS =====
    searchBtn.addEventListener('click', doSearch);
    clearBtn.addEventListener('click', doReset);
    searchIn.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });

    // ===== INIT =====
    render(aartiLibrary);
    resultMsg.textContent = `📖 सभी ${aartiLibrary.length} आरतियाँ प्रदर्शित हो रही हैं`;
})();
